<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Time Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b;
  --s1: #0f0f12;
  --s2: #16161a;
  --s3: #1c1c22;
  --s4: #232329;
  --border: #28282f;
  --border2: #33333c;
  --text: #ededf5;
  --text2: #8e8ea8;
  --text3: #4e4e62;
  --accent: #6f5cff;
  --accent-l: #8b7bff;
  --accent-glow: rgba(111,92,255,0.18);
  --green: #35d47e;
  --green-dim: rgba(53,212,126,0.13);
  --red: #f05252;
  --red-dim: rgba(240,82,82,0.1);
  --amber: #f0a030;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}

body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(111,92,255,0.04) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(53,212,126,0.03) 0%,transparent 60%);pointer-events:none;z-index:0}

/* ── APP SHELL ── */
.app{display:grid;grid-template-columns:400px 1fr;height:100vh;position:relative;z-index:1}

/* ── LEFT PANEL ── */
.left{background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

.lheader{padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.app-title{font-family:var(--sans);font-size:16px;font-weight:800;letter-spacing:-0.03em;display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--accent)}50%{box-shadow:0 0 3px var(--accent);opacity:.6}}
.date-line{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.sync-row{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);margin-top:4px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--text3);transition:all .3s}
.sdot.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.sdot.busy{background:var(--amber);animation:glow 1s infinite}
.sdot.err{background:var(--red)}

/* add task bar */
.add-bar{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.add-input{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 11px;outline:none;transition:border-color .2s}
.add-input:focus{border-color:var(--accent)}
.add-input::placeholder{color:var(--text3)}
.btn-add{background:var(--accent);border:none;border-radius:6px;color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;padding:7px 14px;cursor:pointer;letter-spacing:.04em;transition:all .15s;white-space:nowrap}
.btn-add:hover{background:var(--accent-l);box-shadow:0 0 12px var(--accent-glow)}

/* task list */
.task-scroll{flex:1;overflow-y:auto;padding:10px 12px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.task-scroll::-webkit-scrollbar{width:3px}
.task-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.task-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:7px;border:1px solid transparent;margin-bottom:5px;background:var(--s2);transition:all .2s;position:relative;overflow:hidden}
.task-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border2);border-radius:7px 0 0 7px;transition:all .2s}
.task-row:hover{border-color:var(--border2)}
.task-row.active{background:var(--s3);border-color:var(--border2)}
.task-row.active::before{background:var(--green);box-shadow:0 0 8px var(--green)}

.task-name-wrap{flex:1;min-width:0}
.task-name{font-family:var(--sans);font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.live-badge{font-size:9px;color:var(--green);font-weight:700;letter-spacing:.08em;display:none;animation:blink 1.4s step-end infinite}
.task-row.active .live-badge{display:inline}
@keyframes blink{0%,100%{opacity:.9}50%{opacity:.3}}

.task-time{font-size:11px;font-variant-numeric:tabular-nums;color:var(--text3);min-width:60px;text-align:right;transition:color .2s}
.task-row.active .task-time{color:var(--green);font-weight:600}
.task-live{font-size:11px;font-variant-numeric:tabular-nums;color:var(--green);font-weight:600;min-width:60px;text-align:right;display:none}
.task-row.active .task-live{display:block}
.task-row.active .task-time{display:none}

.btn-toggle{background:none;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;white-space:nowrap}
.btn-toggle:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.task-row.active .btn-toggle{border-color:var(--red);color:var(--red);background:var(--red-dim)}
.task-row.active .btn-toggle:hover{background:rgba(240,82,82,.2)}

.btn-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;border-radius:3px;transition:color .15s;flex-shrink:0}
.btn-del:hover{color:var(--red)}

.empty-tasks{text-align:center;padding:32px 20px;color:var(--text3);font-size:12px}
.empty-tasks .icon{font-size:28px;margin-bottom:8px;opacity:.4}

/* summary */
.summary{border-top:1px solid var(--border);flex-shrink:0;background:var(--s1)}
.summary-head{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;cursor:pointer;user-select:none}
.summary-head:hover .summary-title{color:var(--text2)}
.summary-title{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);transition:color .2s}
.grand-total{font-size:12px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;padding:0 18px 10px;max-height:140px;overflow-y:auto}
.sum-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)}
.sum-name{font-size:10px;color:var(--text2);font-family:var(--sans);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.sum-time{font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums}
.sum-time.has{color:var(--accent)}

/* ── RIGHT PANEL ── */
.right{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}

.rheader{padding:16px 22px 0;flex-shrink:0}
.view-tabs{display:flex;gap:4px;margin-bottom:0}
.vtab{background:none;border:1px solid transparent;color:var(--text3);font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:5px;cursor:pointer;transition:all .15s}
.vtab:hover{color:var(--text2);border-color:var(--border2)}
.vtab.active{background:var(--s2);border-color:var(--border2);color:var(--text)}

.rcontrols{display:flex;align-items:center;gap:8px;padding:10px 22px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.nav-btn{background:none;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.period-label{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--text);flex:1;text-align:center;letter-spacing:-.01em}
.today-btn{background:var(--s2);border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .15s}
.today-btn:hover{border-color:var(--accent-l);color:var(--accent-l)}

.chart-area{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:16px 22px}
.chart-wrap{flex:1;position:relative;min-height:0}

canvas{display:block;width:100%;height:100%}

/* breakdown section */
.breakdown{flex-shrink:0;border-top:1px solid var(--border);padding:14px 22px}
.breakdown-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.breakdown-title{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.breakdown-tabs{display:flex;gap:3px}
.btab{background:none;border:1px solid transparent;color:var(--text3);font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:4px;cursor:pointer;transition:all .15s}
.btab:hover{color:var(--text2)}
.btab.active{background:var(--s2);border-color:var(--border2);color:var(--text)}
.breakdown-bars{display:flex;flex-direction:column;gap:5px;max-height:160px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.bbar-row{display:grid;grid-template-columns:110px 1fr 60px;align-items:center;gap:8px}
.bbar-name{font-family:var(--sans);font-size:10px;font-weight:600;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bbar-track{background:var(--s3);border-radius:3px;height:6px;overflow:hidden}
.bbar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .5s cubic-bezier(.4,0,.2,1)}
.bbar-time{font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums;text-align:right}
.bbar-time.top{color:var(--accent)}

/* toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--s3);border:1px solid var(--border2);border-radius:7px;padding:9px 14px;font-size:11px;color:var(--text2);z-index:9998;transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:260px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:24px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-title{font-family:var(--sans);font-size:15px;font-weight:800;margin-bottom:16px}
.modal-msg{font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.7}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.mbtn{background:none;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:11px;font-weight:600;padding:7px 16px;border-radius:6px;cursor:pointer;transition:all .15s}
.mbtn:hover{border-color:var(--text2);color:var(--text)}
.mbtn.danger{border-color:var(--red);color:var(--red)}
.mbtn.danger:hover{background:var(--red-dim)}

@media(max-width:780px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr;height:auto;min-height:100vh;overflow:auto}
  html,body{overflow:auto}
  .right{min-height:500px}
}
</style>
</head>
<body>
<div class="app">

  <!-- ══ LEFT PANEL ══ -->
  <div class="left panel">
    <div class="lheader">
      <div class="app-title"><span class="live-dot"></span>Time Tracker</div>
      <div class="date-line" id="dateDisplay"></div>
      <div class="sync-row"><span class="sdot" id="sdot"></span><span id="slabel">Connecting…</span></div>
    </div>

    <div class="add-bar">
      <input class="add-input" id="addInput" placeholder="New task name…" maxlength="40" autocomplete="off">
      <button class="btn-add" onclick="addTask()">+ Add</button>
    </div>

    <div class="task-scroll" id="taskList">
      <div class="empty-tasks" id="emptyMsg">
        <div class="icon">⏱</div>
        Add tasks above to start tracking
      </div>
    </div>

    <div class="summary">
      <div class="summary-head" onclick="toggleSummary()">
        <span class="summary-title">Today's Summary</span>
        <span class="grand-total" id="grandTotal">00:00:00</span>
      </div>
      <div class="summary-grid" id="summaryGrid"></div>
    </div>
  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="right panel">
    <div class="rheader">
      <div class="view-tabs">
        <button class="vtab active" onclick="setChartView('day',this)">Day</button>
        <button class="vtab" onclick="setChartView('week',this)">Week</button>
        <button class="vtab" onclick="setChartView('month',this)">Month</button>
      </div>
    </div>
    <div class="rcontrols">
      <button class="nav-btn" onclick="navPeriod(-1)">&#8592;</button>
      <span class="period-label" id="periodLabel"></span>
      <button class="nav-btn" onclick="navPeriod(1)">&#8594;</button>
      <button class="today-btn" onclick="goToday()">Today</button>
    </div>
    <div class="chart-area">
      <div class="chart-wrap">
        <canvas id="mainChart"></canvas>
      </div>
    </div>
    <div class="breakdown">
      <div class="breakdown-head">
        <span class="breakdown-title">Time per Task</span>
        <div class="breakdown-tabs">
          <button class="btab active" onclick="setBreakView('day',this)">Day</button>
          <button class="btab" onclick="setBreakView('week',this)">Week</button>
          <button class="btab" onclick="setBreakView('month',this)">Month</button>
        </div>
      </div>
      <div class="breakdown-bars" id="breakdownBars"></div>
    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-bg" id="delModal">
  <div class="modal">
    <div class="modal-title">Delete Task?</div>
    <div class="modal-msg" id="delModalMsg"></div>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal()">Cancel</button>
      <button class="mbtn danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
// ═══════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyBwVPpgegjkcF8j3nYtpxKiFhDVkoHz8K4",
  authDomain:"l0gger.firebaseapp.com",
  projectId:"l0gger",
  storageBucket:"l0gger.firebasestorage.app",
  messagingSenderId:"834692824569",
  appId:"1:834692824569:web:772b3421ce0c24b1ebd128"
});
const db = firebase.firestore();
db.enablePersistence({synchronizeTabs:true})
  .then(()=>console.log('Firestore offline persistence enabled'))
  .catch(e=>{ if(e.code==='failed-precondition') console.warn('Multi-tab: persistence disabled'); else console.warn('Persistence unavailable:', e); });

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let todayTasks   = [];        // [{id, name, order}]  — today's task list
let todayTotals  = {};        // {taskId: seconds}
let activeTask   = null;      // id
let activeStart  = null;      // Date
let sessionSecs  = 0;
let tickInterval = null;
let pendingLogs  = [];
let allLogs      = [];        // all loaded logs for charts
let deleteTarget = null;

// chart state
let chartView    = 'day';     // day | week | month
let chartOffset  = 0;         // how many periods back from today
let breakView    = 'day';

// colours per task (generated)
const PALETTE = ['#6f5cff','#35d47e','#f05252','#f0a030','#3bc9db','#f06595','#a9e34b','#74c0fc','#e599f7','#ffa94d','#63e6be','#ff8787'];
let taskColors = {};

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const pad = n => String(n).padStart(2,'0');
const hms = s => { s=Math.max(0,Math.floor(s)); return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`; };
const todayStr = () => new Date().toISOString().split('T')[0];
const dateStr  = d => d.toISOString().split('T')[0];

function setSyncStatus(state, label){
  document.getElementById('sdot').className = 'sdot ' + state;
  document.getElementById('slabel').textContent = label;
}

function toast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(t._t); t._t = setTimeout(()=>{ t.className='toast'; }, 2600);
}

function assignColor(taskId){
  if(!taskColors[taskId]){
    const idx = Object.keys(taskColors).length % PALETTE.length;
    taskColors[taskId] = PALETTE[idx];
  }
  return taskColors[taskId];
}

// ═══════════════════════════════════════════
// DATE DISPLAY
// ═══════════════════════════════════════════
function updateDateDisplay(){
  const d = new Date();
  document.getElementById('dateDisplay').textContent =
    d.toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
}
updateDateDisplay();

// ═══════════════════════════════════════════
// TASK MANAGEMENT
// ═══════════════════════════════════════════
async function addTask(){
  const inp = document.getElementById('addInput');
  const name = inp.value.trim();
  if(!name) return;
  inp.value = '';

  // check duplicate today
  if(todayTasks.find(t=>t.name.toLowerCase()===name.toLowerCase())){
    toast('Task already exists today','err'); return;
  }

  const task = {
    name,
    date: todayStr(),
    order: todayTasks.length,
    createdAt: new Date().toISOString()
  };

  setSyncStatus('busy','Saving…');
  try {
    const ref = await db.collection('tasks').add(task);
    task.id = ref.id;
    setSyncStatus('ok','Synced');
  } catch(e){
    task.id = 'local_' + Date.now();
    const pending = JSON.parse(localStorage.getItem('pendingTasks')||'[]');
    pending.push(task);
    localStorage.setItem('pendingTasks', JSON.stringify(pending));
    setSyncStatus('err','Saved offline');
  }

  assignColor(task.id);
  todayTasks.push(task);
  renderTaskList();
  toast(`Task added: ${name}`,'ok');
}

document.getElementById('addInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') addTask();
});

function renderTaskList(){
  const list = document.getElementById('taskList');
  const empty = document.getElementById('emptyMsg');

  if(!todayTasks.length){
    empty.style.display = '';
    list.querySelectorAll('.task-row').forEach(r=>r.remove());
    updateSummary(); return;
  }
  empty.style.display = 'none';

  // rebuild
  list.querySelectorAll('.task-row').forEach(r=>r.remove());
  todayTasks.forEach(task => {
    const row = document.createElement('div');
    row.className = 'task-row' + (activeTask===task.id?' active':'');
    row.id = 'row_' + task.id;
    row.style.setProperty('--task-color', assignColor(task.id));
    if(activeTask===task.id) row.style.setProperty('--before-bg', assignColor(task.id));

    row.innerHTML = `
      <div class="task-name-wrap">
        <div class="task-name">${escHtml(task.name)}</div>
        <span class="live-badge">● live</span>
      </div>
      <div class="task-live" id="live_${task.id}">00:00:00</div>
      <div class="task-time" id="total_${task.id}">${hms(todayTotals[task.id]||0)}</div>
      <button class="btn-toggle" onclick="toggleTask('${task.id}')">${activeTask===task.id?'Stop':'Start'}</button>
      <button class="btn-del" onclick="askDelete('${task.id}')" title="Remove task">×</button>
    `;
    list.appendChild(row);

    // accent bar color
    row.style.setProperty('--lbar', assignColor(task.id));
    if(activeTask===task.id){
      const bar = row.querySelector('::before');
    }
    // inline style for ::before via CSS var hack — just set border-left
    row.style.boxShadow = `inset 3px 0 0 0 ${activeTask===task.id ? assignColor(task.id) : 'var(--border2)'}`;
  });

  updateSummary();
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// delete modal
function askDelete(id){
  const task = todayTasks.find(t=>t.id===id);
  if(!task) return;
  deleteTarget = id;
  document.getElementById('delModalMsg').textContent =
    `Remove "${task.name}" from today's tasks? Time logs will be kept in history.`;
  document.getElementById('delModal').classList.add('open');
}
function closeModal(){ document.getElementById('delModal').classList.remove('open'); deleteTarget=null; }
async function confirmDelete(){
  if(!deleteTarget){ closeModal(); return; }
  const id = deleteTarget;
  closeModal();

  if(activeTask===id) await stopTask();

  // remove from Firestore
  if(!id.startsWith('local_')){
    try{ await db.collection('tasks').doc(id).delete(); } catch(e){}
  }

  todayTasks = todayTasks.filter(t=>t.id!==id);
  delete todayTotals[id];
  renderTaskList();
  toast('Task removed','');
  refreshCharts();
}

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
function startTick(){
  clearInterval(tickInterval);
  tickInterval = setInterval(()=>{
    if(!activeTask||!activeStart) return;
    sessionSecs = (Date.now()-activeStart.getTime())/1000;
    const el = document.getElementById('live_'+activeTask);
    if(el) el.textContent = hms(sessionSecs);
    updateSummary();
  },1000);
}

async function toggleTask(id){
  if(activeTask===id){ await stopTask(); }
  else { if(activeTask) await stopTask(); startTask(id); }
}

function startTask(id){
  const task = todayTasks.find(t=>t.id===id);
  if(!task) return;
  activeTask = id; activeStart = new Date(); sessionSecs = 0;
  renderTaskList(); startTick();
  toast(`▶ ${task.name}`,'ok');
}

async function stopTask(){
  if(!activeTask||!activeStart) return;
  const endTime = new Date();
  const duration = Math.floor((endTime-activeStart)/1000);
  const id = activeTask;
  const task = todayTasks.find(t=>t.id===id);

  activeTask=null; activeStart=null; sessionSecs=0;
  clearInterval(tickInterval);

  todayTotals[id] = (todayTotals[id]||0) + duration;
  renderTaskList();

  const entry = {
    taskId: id,
    taskName: task ? task.name : id,
    startTime: activeStart ? activeStart.toISOString() : endTime.toISOString(),
    endTime: endTime.toISOString(),
    duration,
    date: todayStr()
  };
  // fix startTime
  const st = new Date(endTime - duration*1000);
  entry.startTime = st.toISOString();

  setSyncStatus('busy','Saving…');
  try {
    await db.collection('timelogs').add(entry);
    setSyncStatus('ok','Synced');
    toast(`Logged ${hms(duration)} for ${entry.taskName}`,'ok');
  } catch(e){
    const pl = JSON.parse(localStorage.getItem('pendingLogs')||'[]');
    pl.push(entry); localStorage.setItem('pendingLogs', JSON.stringify(pl));
    setSyncStatus('err','Saved offline');
    toast('Saved offline','');
  }

  allLogs.push(entry);
  refreshCharts();
}

// ═══════════════════════════════════════════
// SUMMARY
// ═══════════════════════════════════════════
function updateSummary(){
  const grid = document.getElementById('summaryGrid');
  const grand = document.getElementById('grandTotal');
  grid.innerHTML = '';
  let total = 0;

  todayTasks.forEach(task=>{
    let s = (todayTotals[task.id]||0) + (activeTask===task.id?sessionSecs:0);
    total += s;
    const row = document.createElement('div');
    row.className = 'sum-row';
    row.innerHTML = `<span class="sum-name">${escHtml(task.name)}</span><span class="sum-time${s>0?' has':''}">${hms(s)}</span>`;
    grid.appendChild(row);
  });

  grand.textContent = hms(total);
}

function toggleSummary(){
  const g = document.getElementById('summaryGrid');
  g.style.display = g.style.display==='none' ? '' : 'none';
}

// ═══════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════
async function loadAll(){
  setSyncStatus('busy','Loading…');
  const today = todayStr();

  try {
    // Load today's tasks — NO orderBy to avoid needing a composite index
    const tsnap = await db.collection('tasks').where('date','==',today).get();
    todayTasks = [];
    tsnap.forEach(doc=>{ const d=doc.data(); todayTasks.push({id:doc.id,...d}); assignColor(doc.id); });
    todayTasks.sort((a,b)=>(a.order||0)-(b.order||0)); // sort client-side

    // Load logs for last 35 days — single where clause, no orderBy (no index needed)
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-35);
    const cutoffStr = cutoff.toISOString().split('T')[0];
    const lsnap = await db.collection('timelogs').where('date','>=',cutoffStr).get();
    allLogs = [];
    lsnap.forEach(doc=>{ allLogs.push({id:doc.id,...doc.data()}); });
    allLogs.sort((a,b)=>a.date.localeCompare(b.date)); // sort client-side

    // Compute today totals
    todayTotals = {};
    allLogs.filter(l=>l.date===today).forEach(l=>{
      todayTotals[l.taskId] = (todayTotals[l.taskId]||0) + (l.duration||0);
    });

    renderTaskList();
    setSyncStatus('ok','Synced ✓');
    await flushPending();
    refreshCharts();
  } catch(e){
    // Show the real error so it can be diagnosed
    const msg = (e.message||'Unknown error');
    console.error('Firebase loadAll error:', e.code, e.message);
    setSyncStatus('err', msg.length>44 ? msg.slice(0,42)+'…' : msg);
    toast('Error: ' + msg.slice(0,70), 'err');
    renderTaskList();
    refreshCharts();
  }
}

async function flushPending(){
  try {
    const pl = JSON.parse(localStorage.getItem('pendingLogs')||'[]');
    const pt = JSON.parse(localStorage.getItem('pendingTasks')||'[]');
    if(!pl.length && !pt.length) return;
    const batch = db.batch();
    pl.forEach(e=>{ const r=db.collection('timelogs').doc(); batch.set(r,e); });
    pt.forEach(e=>{ const r=db.collection('tasks').doc(); batch.set(r,e); });
    await batch.commit();
    localStorage.removeItem('pendingLogs'); localStorage.removeItem('pendingTasks');
    toast(`Synced ${pl.length+pt.length} offline entries`,'ok');
  } catch(e){}
}

// ═══════════════════════════════════════════
// CHART ENGINE  — 3 distinct visual modes
//   DAY   → 24h bubble timeline
//   WEEK  → multi-line chart (one line per task)
//   MONTH → multi-line chart (one line per task)
// ═══════════════════════════════════════════
function setChartView(v, el){
  chartView=v; chartOffset=0;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  refreshCharts();
}
function navPeriod(d){ chartOffset+=d; refreshCharts(); }
function goToday(){ chartOffset=0; refreshCharts(); }

function setBreakView(v,el){
  breakView=v;
  document.querySelectorAll('.btab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderBreakdown();
}

function refreshCharts(){
  renderMainChart();
  renderBreakdown();
}

// ── Period helpers ──────────────────────────
function getPeriodRange(){
  const now = new Date();
  if(chartView==='day'){
    const d = new Date(now); d.setDate(d.getDate()+chartOffset);
    const s = dateStr(d);
    return {start:s, end:s, dates:[s]};
  }
  if(chartView==='week'){
    const d = new Date(now); d.setDate(d.getDate() + chartOffset*7);
    const dow = d.getDay(); const mon = new Date(d); mon.setDate(d.getDate()-(dow===0?6:dow-1));
    const dates=[];
    for(let i=0;i<7;i++){ const x=new Date(mon); x.setDate(mon.getDate()+i); dates.push(dateStr(x)); }
    return {start:dates[0], end:dates[6], dates};
  }
  const d = new Date(now.getFullYear(), now.getMonth()+chartOffset, 1);
  const year=d.getFullYear(), month=d.getMonth();
  const days = new Date(year,month+1,0).getDate();
  const dates=[];
  for(let i=1;i<=days;i++) dates.push(dateStr(new Date(year,month,i)));
  return {start:dates[0], end:dates[dates.length-1], dates};
}

function getPeriodLabel(){
  const {start,end} = getPeriodRange();
  if(chartView==='day'){
    const d = new Date(start+'T12:00:00');
    return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  }
  if(chartView==='week'){
    const s=new Date(start+'T12:00:00'), e=new Date(end+'T12:00:00');
    return `${s.toLocaleDateString(undefined,{month:'short',day:'numeric'})} – ${e.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}`;
  }
  const d=new Date(start+'T12:00:00');
  return d.toLocaleDateString(undefined,{month:'long',year:'numeric'});
}

function getAggregated(){
  const {dates} = getPeriodRange();
  const byDate = {};
  const taskSet = new Set();
  dates.forEach(d=>{ byDate[d]={}; });
  allLogs.filter(l=>dates.includes(l.date)).forEach(l=>{
    const tn = l.taskName||l.taskId;
    taskSet.add(tn);
    byDate[l.date][tn] = (byDate[l.date][tn]||0) + (l.duration||0);
  });
  if(activeTask && activeStart){
    const task = todayTasks.find(t=>t.id===activeTask);
    if(task && dates.includes(todayStr())){
      taskSet.add(task.name);
      byDate[todayStr()][task.name] = (byDate[todayStr()][task.name]||0) + sessionSecs;
    }
  }
  return {byDate, dates, tasks:[...taskSet]};
}

function colorForName(name){
  const task = todayTasks.find(t=>t.name===name);
  if(task) return assignColor(task.id);
  let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))&0xffff;
  return PALETTE[h % PALETTE.length];
}

// ── Canvas setup ────────────────────────────
function setupCanvas(id){
  const canvas = document.getElementById(id);
  if(!canvas) return null;
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio||1;
  const W = Math.max(100, wrap.clientWidth);
  const H = Math.max(80,  wrap.clientHeight);
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  return {ctx, W, H};
}

// ── Main chart dispatcher ───────────────────
function renderMainChart(){
  document.getElementById('periodLabel').textContent = getPeriodLabel();
  if(chartView==='day')   renderDayBubble();
  else                    renderLineChart();
}

// ══════════════════════════════════════════
//  DAY VIEW — Orbital bubble system
//
//  Central clock circle shows total tracked time.
//  Each task = a filled circle sized by duration,
//  orbiting the centre. Labels + times outside.
//  Background: faint orbit ring + subtle particles.
// ══════════════════════════════════════════
function renderDayBubble(){
  const r = setupCanvas('mainChart');
  if(!r) return;
  const {ctx, W, H} = r;

  const dateKey = getPeriodRange().dates[0];
  const dayLogs = allLogs.filter(l=>l.date===dateKey);

  // include live session
  const liveLogs = [...dayLogs];
  if(activeTask && activeStart && dateKey===todayStr()){
    const task = todayTasks.find(t=>t.id===activeTask);
    if(task) liveLogs.push({
      taskId:activeTask, taskName:task.name,
      startTime:activeStart.toISOString(),
      endTime:new Date().toISOString(),
      duration:Math.floor(sessionSecs), date:dateKey
    });
  }

  // aggregate per-task totals
  const taskTotals = {};
  liveLogs.forEach(l=>{
    const tn = l.taskName||l.taskId;
    taskTotals[tn] = (taskTotals[tn]||0) + (l.duration||0);
  });
  const entries   = Object.entries(taskTotals).sort((a,b)=>b[1]-a[1]);
  const totalSecs = entries.reduce((a,e)=>a+e[1], 0);
  const maxSecs   = entries[0]?.[1] || 1;

  // ── Layout ──────────────────────────────────────
  const cx = W/2, cy = H/2;
  const minDim   = Math.min(W, H);

  // Central hub
  const hubR     = minDim * 0.148;

  // Orbit radius — where bubble centres live
  const orbitR   = minDim * 0.305;

  // Bubble size range
  const MAX_BUB  = minDim * 0.108;
  const MIN_BUB  = minDim * 0.042;

  // ── Space-black deep background vignette ────────
  const vgn = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.72);
  vgn.addColorStop(0,'rgba(14,14,20,0)');
  vgn.addColorStop(1,'rgba(4,4,8,0.82)');
  ctx.fillStyle=vgn;
  ctx.fillRect(0,0,W,H);

  // ── Faint orbit tracks ───────────────────────────
  // Outer atmosphere ring
  ctx.beginPath(); ctx.arc(cx,cy,orbitR+MAX_BUB+18,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.018)'; ctx.lineWidth=1; ctx.stroke();
  // Main orbit ring
  ctx.beginPath(); ctx.arc(cx,cy,orbitR,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  ctx.setLineDash([4,9]); ctx.stroke(); ctx.setLineDash([]);
  // Inner ring
  ctx.beginPath(); ctx.arc(cx,cy,orbitR-MAX_BUB-12,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.014)'; ctx.lineWidth=1; ctx.stroke();

  if(!entries.length){
    // Empty state
    drawHub(ctx, cx, cy, hubR, 0, 0, false);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`600 12px 'Syne'`; ctx.fillStyle='#2a2a38';
    ctx.fillText('Add tasks & start tracking', cx, cy+hubR+28);
    return;
  }

  // ── Per-task: compute position & draw ───────────
  entries.forEach(([name,secs],i)=>{
    const n      = entries.length;
    const angle  = (i/n)*Math.PI*2 - Math.PI/2;
    const bR     = MIN_BUB + (secs/maxSecs)*(MAX_BUB-MIN_BUB);
    const bx     = cx + Math.cos(angle)*orbitR;
    const by_    = cy + Math.sin(angle)*orbitR;
    const color  = colorForName(name);
    const isLive = !!(activeTask && dateKey===todayStr() && todayTasks.find(t=>t.id===activeTask && t.name===name));

    // -- connector line --
    const lsx = cx + Math.cos(angle)*(hubR+3);
    const lsy = cy + Math.sin(angle)*(hubR+3);
    const lex = cx + Math.cos(angle)*(orbitR - bR - 2);
    const ley = cy + Math.sin(angle)*(orbitR - bR - 2);
    const cg  = ctx.createLinearGradient(lsx,lsy,lex,ley);
    cg.addColorStop(0, color+'00');
    cg.addColorStop(0.5, color+'30');
    cg.addColorStop(1, color+'00');
    ctx.beginPath(); ctx.moveTo(lsx,lsy); ctx.lineTo(lex,ley);
    ctx.strokeStyle=cg; ctx.lineWidth=1.2; ctx.stroke();

    // -- outer glow halo --
    const halo = ctx.createRadialGradient(bx,by_,bR*0.5,bx,by_,bR*2.2);
    halo.addColorStop(0, color+'38');
    halo.addColorStop(0.5, color+'14');
    halo.addColorStop(1, color+'00');
    ctx.beginPath(); ctx.arc(bx,by_,bR*2.2,0,Math.PI*2);
    ctx.fillStyle=halo; ctx.fill();

    // -- bubble body: 3D sphere gradient --
    const hx = bx - bR*0.3, hy = by_ - bR*0.32;
    const sphereG = ctx.createRadialGradient(hx,hy,bR*0.02, bx,by_,bR);
    sphereG.addColorStop(0,   mixColor(color,'#ffffff',0.48));
    sphereG.addColorStop(0.28,mixColor(color,'#ffffff',0.12));
    sphereG.addColorStop(0.65, color);
    sphereG.addColorStop(1,   mixColor(color,'#000000',0.45));
    ctx.beginPath(); ctx.arc(bx,by_,bR,0,Math.PI*2);
    ctx.fillStyle=sphereG; ctx.fill();

    // -- specular shine --
    const shine = ctx.createRadialGradient(hx,hy,0,hx,hy,bR*0.58);
    shine.addColorStop(0,'rgba(255,255,255,0.28)');
    shine.addColorStop(0.5,'rgba(255,255,255,0.06)');
    shine.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(bx,by_,bR,0,Math.PI*2);
    ctx.fillStyle=shine; ctx.fill();

    // -- live pulse ring --
    if(isLive){
      const pulse=(Math.sin(Date.now()/380)+1)/2;
      ctx.beginPath(); ctx.arc(bx,by_,bR+3+pulse*5,0,Math.PI*2);
      ctx.strokeStyle=`rgba(53,212,126,${0.2+pulse*0.35})`; ctx.lineWidth=1.5+pulse; ctx.stroke();
    }

    // -- label + time --
    const labelR   = orbitR + bR + 16;
    const lx2      = cx + Math.cos(angle)*labelR;
    const ly2      = cy + Math.sin(angle)*labelR;
    const cosA     = Math.cos(angle), sinA = Math.sin(angle);

    ctx.save();
    ctx.textAlign    = cosA >  0.12 ? 'left' : cosA < -0.12 ? 'right' : 'center';
    ctx.textBaseline = sinA >  0.25 ? 'top'  : sinA < -0.25 ? 'bottom' : 'middle';

    // name
    ctx.font=`700 11px 'Syne'`; ctx.fillStyle='#ededf5';
    const lbl = name.length>13?name.slice(0,11)+'…':name;
    ctx.fillText(lbl, lx2, ly2);

    // time — one line below name in label direction
    const lineH = 14;
    const tx2 = lx2, ty2 = ly2 + (sinA > 0.25 ? lineH : sinA < -0.25 ? -lineH : 0);
    ctx.font=`500 10px 'JetBrains Mono'`; ctx.fillStyle=color;
    ctx.textBaseline = sinA > 0.25 ? 'top' : sinA < -0.25 ? 'bottom' : 'middle';
    ctx.fillText(hms(secs), tx2, ty2 + (Math.abs(sinA)>0.25?0:lineH*0.9));
    ctx.restore();
  });

  // ── Central hub ─────────────────────────────────
  drawHub(ctx, cx, cy, hubR, totalSecs, entries.length, activeTask && dateKey===todayStr());
}

// ── Draw the central hub circle ─────────────────
function drawHub(ctx, cx, cy, hubR, totalSecs, taskCount, isLive){
  // Deep outer glow
  const outerGlow = ctx.createRadialGradient(cx,cy,hubR*0.6,cx,cy,hubR*2);
  outerGlow.addColorStop(0,'rgba(111,92,255,0.14)');
  outerGlow.addColorStop(1,'rgba(111,92,255,0)');
  ctx.beginPath(); ctx.arc(cx,cy,hubR*2,0,Math.PI*2);
  ctx.fillStyle=outerGlow; ctx.fill();

  // Body
  const bodyG = ctx.createRadialGradient(cx-hubR*0.22,cy-hubR*0.22,hubR*0.04,cx,cy,hubR);
  bodyG.addColorStop(0,'#252535');
  bodyG.addColorStop(0.6,'#131320');
  bodyG.addColorStop(1,'#090910');
  ctx.beginPath(); ctx.arc(cx,cy,hubR,0,Math.PI*2);
  ctx.fillStyle=bodyG; ctx.fill();

  // Border
  ctx.beginPath(); ctx.arc(cx,cy,hubR,0,Math.PI*2);
  ctx.strokeStyle='rgba(111,92,255,0.22)'; ctx.lineWidth=1.5; ctx.stroke();

  // Progress arc — fraction of 24h tracked
  if(totalSecs>0){
    const pct = Math.min(totalSecs/86400,1);
    const aStart=-Math.PI/2, aEnd=aStart+pct*Math.PI*2;
    // Track
    ctx.beginPath(); ctx.arc(cx,cy,hubR-2,0,Math.PI*2);
    ctx.strokeStyle='rgba(111,92,255,0.08)'; ctx.lineWidth=3; ctx.stroke();
    // Fill
    ctx.beginPath(); ctx.arc(cx,cy,hubR-2,aStart,aEnd);
    ctx.strokeStyle='#6f5cff'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
    // Glow on progress arc tip
    const tipX=cx+Math.cos(aEnd)*(hubR-2), tipY=cy+Math.sin(aEnd)*(hubR-2);
    const tipGlow=ctx.createRadialGradient(tipX,tipY,0,tipX,tipY,8);
    tipGlow.addColorStop(0,'rgba(111,92,255,0.7)');
    tipGlow.addColorStop(1,'rgba(111,92,255,0)');
    ctx.beginPath(); ctx.arc(tipX,tipY,8,0,Math.PI*2);
    ctx.fillStyle=tipGlow; ctx.fill();
  }

  // Inner subtle specular
  const spec=ctx.createRadialGradient(cx-hubR*0.28,cy-hubR*0.3,0,cx-hubR*0.1,cy-hubR*0.1,hubR*0.55);
  spec.addColorStop(0,'rgba(255,255,255,0.055)');
  spec.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(cx,cy,hubR,0,Math.PI*2);
  ctx.fillStyle=spec; ctx.fill();

  // Live pulse ring
  if(isLive){
    const pulse=(Math.sin(Date.now()/420)+1)/2;
    ctx.beginPath(); ctx.arc(cx,cy,hubR+3+pulse*7,0,Math.PI*2);
    ctx.strokeStyle=`rgba(53,212,126,${0.12+pulse*0.28})`; ctx.lineWidth=2; ctx.stroke();
  }

  // Text
  ctx.textAlign='center'; ctx.textBaseline='middle';
  if(totalSecs>0){
    const h=Math.floor(totalSecs/3600), m=Math.floor((totalSecs%3600)/60), s=Math.floor(totalSecs%60);
    const timeStr=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    ctx.font=`700 ${Math.round(hubR*0.33)}px 'JetBrains Mono'`; ctx.fillStyle='#ededf5';
    ctx.fillText(timeStr, cx, cy - hubR*0.14);
    ctx.font=`600 ${Math.round(hubR*0.17)}px 'Syne'`; ctx.fillStyle='#4e4e62';
    ctx.fillText('TRACKED TODAY', cx, cy+hubR*0.22);
    const pct2=Math.round((totalSecs/86400)*100);
    ctx.font=`${Math.round(hubR*0.14)}px 'JetBrains Mono'`; ctx.fillStyle='#35356e';
    ctx.fillText(`${pct2}% of 24h`, cx, cy+hubR*0.44);
  } else {
    ctx.font=`600 ${Math.round(hubR*0.2)}px 'Syne'`; ctx.fillStyle='#252535';
    ctx.fillText('NO DATA', cx, cy-hubR*0.1);
    ctx.font=`${Math.round(hubR*0.15)}px 'Syne'`; ctx.fillStyle='#1c1c28';
    ctx.fillText('start a task', cx, cy+hubR*0.2);
  }
}

// ── Colour mix helper ────────────────────────────
function mixColor(hex, hex2, t){
  const parse=h=>{ const v=parseInt(h.slice(1),16); return [(v>>16)&255,(v>>8)&255,v&255]; };
  const a=parse(hex), b=parse(hex2);
  const r=Math.round(a[0]+(b[0]-a[0])*t);
  const g=Math.round(a[1]+(b[1]-a[1])*t);
  const bv=Math.round(a[2]+(b[2]-a[2])*t);
  return '#'+((r<<16)|(g<<8)|bv).toString(16).padStart(6,'0');
}


function lightenHex(hex, amt){
  const v=parseInt(hex.slice(1),16);
  let r=(v>>16)&255, g=(v>>8)&255, b=v&255;
  r=Math.min(255,Math.round(r+(255-r)*amt));
  g=Math.min(255,Math.round(g+(255-g)*amt));
  b=Math.min(255,Math.round(b+(255-b)*amt));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}
function darkenHex(hex, amt){
  const v=parseInt(hex.slice(1),16);
  let r=(v>>16)&255, g=(v>>8)&255, b=v&255;
  r=Math.max(0,Math.round(r*(1-amt)));
  g=Math.max(0,Math.round(g*(1-amt)));
  b=Math.max(0,Math.round(b*(1-amt)));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

// ══════════════════════════════════════════
//  WEEK / MONTH VIEW — multi-line chart
//
//  Y axis = hours tracked that day
//  Each task = one coloured line with dots
//  Smooth bezier curves between data points
// ══════════════════════════════════════════
function renderLineChart(){
  const r = setupCanvas('mainChart');
  if(!r) return;
  const {ctx, W, H} = r;

  const {byDate, dates, tasks} = getAggregated();

  const PL=52, PR=20, PT=20, PB=38;
  const CW=W-PL-PR, CH=H-PT-PB;
  if(CW<=0||CH<=0) return;

  // max seconds across all days
  let maxSecs=0;
  dates.forEach(d=>{
    Object.values(byDate[d]||{}).forEach(v=>{ if(v>maxSecs) maxSecs=v; });
  });
  if(maxSecs<3600) maxSecs=3600;
  maxSecs = Math.ceil(maxSecs/3600)*3600;

  // ── Y axis grid ──
  ctx.font=`10px 'JetBrains Mono'`;
  ctx.textBaseline='middle'; ctx.textAlign='right';
  const yTicks=4;
  for(let i=0;i<=yTicks;i++){
    const s=(maxSecs/yTicks)*i;
    const y=PT+CH-(CH*i/yTicks);
    ctx.fillStyle='#4e4e62';
    const hrs=s/3600;
    ctx.fillText(hrs%1===0?hrs+'h':(hrs.toFixed(1))+'h', PL-6, y);
    ctx.strokeStyle=i===0?'#33333c':'#1c1c22';
    ctx.lineWidth=i===0?1:.7;
    ctx.beginPath(); ctx.moveTo(PL,y); ctx.lineTo(PL+CW,y); ctx.stroke();
  }

  // ── X axis labels ──
  const step = dates.length>15 ? Math.ceil(dates.length/12) : 1;
  dates.forEach((date,di)=>{
    if(di%step!==0 && di!==dates.length-1) return;
    const x=PL+(di/(dates.length-1||1))*CW;
    ctx.fillStyle='#4e4e62'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.font=`10px 'JetBrains Mono'`;
    const dObj=new Date(date+'T12:00:00');
    const lbl = chartView==='week'
      ? dObj.toLocaleDateString([],{weekday:'short'})
      : dObj.getDate().toString();
    ctx.fillText(lbl, x, PT+CH+6);
  });

  if(!tasks.length){
    ctx.fillStyle='#4e4e62'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font="12px 'Syne'";
    ctx.fillText('No data for this period', PL+CW/2, PT+CH/2);
    return;
  }

  // ── Draw lines ──
  tasks.forEach(taskName=>{
    const color = colorForName(taskName);
    const points = dates.map((date,di)=>{
      const secs = (byDate[date]||{})[taskName]||0;
      const x = PL+(di/(dates.length-1||1))*CW;
      const y = PT+CH - (secs/maxSecs)*CH;
      return {x, y, secs};
    });

    // Drop points with no data — but still draw them at baseline for continuity
    // Only draw line through days with data
    const hasData = points.some(p=>p.secs>0);
    if(!hasData) return;

    // ── Shadow / glow pass ──
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.12;
    ctx.filter = 'blur(4px)';
    drawSmoothLine(ctx, points);
    ctx.restore();

    // ── Main line ──
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.9;
    ctx.lineJoin='round';
    ctx.lineCap='round';
    drawSmoothLine(ctx, points);
    ctx.restore();

    // ── Area fill under line ──
    ctx.save();
    const grad = ctx.createLinearGradient(0, PT, 0, PT+CH);
    grad.addColorStop(0, color+'40');
    grad.addColorStop(1, color+'00');
    ctx.fillStyle = grad;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.moveTo(points[0].x, PT+CH);
    points.forEach((p,i)=>{
      if(i===0){ ctx.lineTo(p.x,p.y); return; }
      const prev=points[i-1];
      const cpx=(prev.x+p.x)/2;
      ctx.bezierCurveTo(cpx,prev.y,cpx,p.y,p.x,p.y);
    });
    ctx.lineTo(points[points.length-1].x, PT+CH);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // ── Data point dots ──
    points.forEach(p=>{
      if(p.secs<=0) return;
      // outer glow
      ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2);
      ctx.fillStyle=color+'44'; ctx.fill();
      // dot
      ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2);
      ctx.fillStyle=color; ctx.fill();
      // white centre
      ctx.beginPath(); ctx.arc(p.x,p.y,1,0,Math.PI*2);
      ctx.fillStyle='#fff'; ctx.fill();
    });
  });

  // ── Legend ──
  drawLegend(ctx, tasks, W, PT);
}

// smooth bezier line helper
function drawSmoothLine(ctx, points){
  if(!points.length) return;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for(let i=1;i<points.length;i++){
    const prev=points[i-1], cur=points[i];
    const cpx=(prev.x+cur.x)/2;
    ctx.bezierCurveTo(cpx,prev.y,cpx,cur.y,cur.x,cur.y);
  }
  ctx.stroke();
}

function drawLegend(ctx, tasks, W, topY){
  if(!tasks.length) return;
  const show = tasks.slice(0,7);
  let lx=W-12, ly=topY+4;
  ctx.textAlign='right'; ctx.textBaseline='middle';
  ctx.font=`10px 'Syne'`;
  show.forEach((t,i)=>{
    const color=colorForName(t);
    ctx.fillStyle=color;
    // small coloured circle
    ctx.beginPath(); ctx.arc(lx-4, ly+i*14, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#8e8ea8';
    ctx.fillText(t.length>15?t.slice(0,13)+'…':t, lx-12, ly+i*14);
  });
}

function roundRect(ctx,x,y,w,h,r){
  if(h<=0){return;}
  r=Math.min(r,h/2,w/2);
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h); ctx.lineTo(x,y+h); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── BREAKDOWN BARS ──
function getBreakdownRange(){
  const now = new Date();
  if(breakView==='day') return [todayStr()];
  if(breakView==='week'){
    const dow=now.getDay(); const mon=new Date(now); mon.setDate(now.getDate()-(dow===0?6:dow-1));
    const d=[]; for(let i=0;i<7;i++){const x=new Date(mon);x.setDate(mon.getDate()+i);d.push(dateStr(x));}
    return d;
  }
  const d=[]; const year=now.getFullYear(),month=now.getMonth();
  const days=new Date(year,month+1,0).getDate();
  for(let i=1;i<=days;i++) d.push(dateStr(new Date(year,month,i)));
  return d;
}

function renderBreakdown(){
  const dates = getBreakdownRange();
  const totals = {};

  allLogs.filter(l=>dates.includes(l.date)).forEach(l=>{
    const tn = l.taskName||l.taskId;
    totals[tn] = (totals[tn]||0) + (l.duration||0);
  });
  if(activeTask && activeStart && dates.includes(todayStr())){
    const task = todayTasks.find(t=>t.id===activeTask);
    if(task){ totals[task.name]=(totals[task.name]||0)+sessionSecs; }
  }

  const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const maxSecs = sorted[0]?.[1]||1;
  const container = document.getElementById('breakdownBars');
  container.innerHTML='';

  if(!sorted.length){
    container.innerHTML='<div style="color:var(--text3);font-size:11px;padding:8px 0">No data for this period</div>';
    return;
  }

  sorted.forEach(([name,secs],i)=>{
    const pct = Math.round((secs/maxSecs)*100);
    const color = colorForName(name);
    const row = document.createElement('div');
    row.className='bbar-row';
    row.innerHTML=`
      <span class="bbar-name" title="${escHtml(name)}">${escHtml(name)}</span>
      <div class="bbar-track"><div class="bbar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="bbar-time${i===0?' top':''}">${hms(secs)}</span>
    `;
    container.appendChild(row);
  });
}

window.addEventListener('beforeunload',()=>{
  if(activeTask&&activeStart){
    const endTime=new Date(), duration=Math.floor((endTime-activeStart)/1000);
    const task=todayTasks.find(t=>t.id===activeTask);
    const entry={taskId:activeTask,taskName:task?task.name:activeTask,
      startTime:activeStart.toISOString(),endTime:endTime.toISOString(),duration,date:todayStr()};
    const pl=JSON.parse(localStorage.getItem('pendingLogs')||'[]');
    pl.push(entry); localStorage.setItem('pendingLogs',JSON.stringify(pl));
    try{ db.collection('timelogs').add(entry); }catch(e){}
  }
});

// ═══════════════════════════════════════════
// MIDNIGHT REFRESH
// ═══════════════════════════════════════════
function scheduleMidnight(){
  const now=new Date(), midnight=new Date(now); midnight.setHours(24,0,0,0);
  setTimeout(async()=>{
    if(activeTask) await stopTask();
    todayTasks=[]; todayTotals={};
    updateDateDisplay(); renderTaskList(); refreshCharts();
    scheduleMidnight();
  }, midnight-now);
}

// Quick connectivity ping — write a heartbeat doc to verify rules allow writes
async function pingFirebase(){
  try {
    await db.collection('_ping').doc('test').set({ts: new Date().toISOString()});
    setSyncStatus('ok','Firebase connected');
    console.log('Firebase write test: OK');
  } catch(e){
    console.error('Firebase write test FAILED:', e.code, e.message);
    // Common: permission-denied means Firestore rules block writes
    if(e.code==='permission-denied'){
      setSyncStatus('err','Rules blocked — check Firestore rules');
      toast('Firestore rules are blocking access. Set rules to allow read/write.','err');
    } else {
      setSyncStatus('err', e.message.slice(0,50));
    }
  }
}

pingFirebase();
loadAll();
scheduleMidnight();
